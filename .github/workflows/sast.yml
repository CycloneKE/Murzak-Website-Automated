name: Security Audit & SAST

on:
  push:
    # market-readiness-hardening included so CI runs pre-merge: pull_request
    # events don't start workflows that have never existed on the default
    # branch, but push events run the workflow from the pushed ref itself.
    branches: [ "main", "master", "market-readiness-hardening" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Run weekly at midnight on Sunday

jobs:
  npm-audit:
    name: NPM Audit (Backend & Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm run install:all

      - name: Audit Backend
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Audit Frontend
        working-directory: ./frontend
        run: npm audit --audit-level=high

  backend-tests:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./backend
        # Mocked throughout (no Redis/Frappe/PayPal creds needed): provisioning
        # state machine + the B1 payment-verified-activation gate.
        run: npm test

  frontend-build:
    name: Frontend Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Typecheck
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Production Build
        working-directory: ./frontend
        run: npm run build

  e2e-tests:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        # Chromium only in CI to keep this fast; run the full 3-browser matrix
        # locally (npx playwright test) before a release if you need it.
        run: npx playwright install --with-deps chromium

      - name: Start backend (mocked Frappe, dev mode — no real creds needed)
        working-directory: ./backend
        env:
          NODE_ENV: development
          PORT: 3001
          SESSION_SECRET: ci-e2e-secret-not-used-in-production
          MOCK_FRAPPE: 'true'
        run: |
          nohup node server.js > backend.log 2>&1 &
          for i in $(seq 1 30); do
            # /api/health is the unauthenticated liveness probe — /api/auth/me
            # returns 401 without a session, which curl -f treats as failure.
            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "Backend is up."
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready in time." >&2
          cat backend.log || true
          exit 1

      - name: Run E2E Tests
        working-directory: ./frontend
        run: npx playwright test --project=chromium

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

